<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ config.title }}</title>
    <meta name="description" content="{{ config.description }}" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #1f1f28;
        color: #dcd7ba;
        font-family: Georgia, serif;
        padding: 2rem;
      }
      main {
        text-align: center;
        max-width: 40ch;
      }
      h1 {
        font-size: 1.25rem;
        opacity: 0.5;
        margin-bottom: 2rem;
        letter-spacing: 0.05em;
      }
      blockquote {
        font-size: 1.5rem;
        line-height: 1.6;
        font-style: italic;
      }
      footer {
        margin-top: 3rem;
        font-size: 0.8rem;
        opacity: 0.3;
      }
      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>{{ config.title }}</h1>
      <blockquote>Aún estoy bajando la medicina.</blockquote>
      <footer>
        <a href="https://circulo.pages.dev">← Círculo</a>
      </footer>
    </main>
  </body>
</html>
